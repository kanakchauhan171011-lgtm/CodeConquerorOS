<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Conqueror OS </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-heading" 
class="fixed top-4 left-1/2 -translate-x-1/2 text-white text-2xl font-bold tracking-wide opacity-0 transition duration-1000">
    Welcome to Code Conqueror OS 🚀
</div>

    <div id="boot-screen">
        <div class="mb-6"><i data-lucide="shield-check" class="w-20 h-20 text-blue-500 animate-bounce"></i></div>
        <h1 class="text-5xl font-bold tracking-[0.2em] mb-2 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-600">CODE CONQUEROR</h1>
        <p class="text-gray-400 tracking-widest text-sm uppercase">Elite OS Architecture</p>
        <div class="mt-8 w-64 h-1 bg-gray-900 rounded-full overflow-hidden">
            <div id="loader-bar" class="h-full bg-blue-500 transition-all duration-[3000ms] w-0"></div>
        </div>
    </div>

    <div class="p-8 grid grid-cols-1 gap-8 w-32">
        <div onclick="openApp('browser')" class="group flex flex-col items-center gap-2 cursor-pointer">
            <div class="glass p-4 rounded-2xl group-hover:scale-110 transition"><i data-lucide="search" class="text-blue-400 w-8 h-8"></i></div>
            <span class="text-xs font-semibold uppercase tracking-tighter">Google</span>
        </div>
        <div onclick="openApp('files')" class="group flex flex-col items-center gap-2 cursor-pointer">
            <div class="glass p-4 rounded-2xl group-hover:scale-110 transition"><i data-lucide="folder-open" class="text-yellow-400 w-8 h-8"></i></div>
            <span class="text-xs font-semibold uppercase tracking-tighter">My Files</span>
        </div>
        <div onclick="openApp('youtube')" class="group flex flex-col items-center gap-2 cursor-pointer">
            <div class="glass p-4 rounded-2xl group-hover:scale-110 transition"><i data-lucide="play-circle" class="text-red-500 w-8 h-8"></i></div>
            <span class="text-xs font-semibold uppercase tracking-tighter">YouTube</span>
        </div>
    </div>

    <div id="browser" class="window glass w-[900px] h-[600px] top-10 left-64">
        <div class="title-bar">
            <div class="flex items-center gap-2"><i data-lucide="globe" class="w-4 h-4 text-blue-400"></i><span>Conqueror Google</span></div>
            <button onclick="closeApp('browser')" class="text-red-500 font-bold hover:bg-red-500/20 px-2 rounded">✕</button>
        </div>
        <div class="app-body flex flex-col">
            <div class="p-3 bg-neutral-900 flex gap-2">
                <input type="text" id="google-search" placeholder="Search Google or type URL" class="flex-1 bg-neutral-800 rounded-full px-4 py-2 text-sm outline-none border border-white/10 focus:border-blue-500">
                <button onclick="doGoogleSearch()" class="conqueror-btn px-6 py-2 rounded-full text-sm font-bold">Search</button>
            </div>
            <iframe id="browser-iframe" src="https://www.google.com/search?igu=1" class="w-full h-full bg-white"></iframe>
        </div>
    </div>

    <div id="files" class="window glass w-[700px] h-[500px] top-32 left-80">
        <div class="title-bar"><span>📂 Explorer</span><button onclick="closeApp('files')" class="text-red-500 font-bold">✕</button></div>
        <div class="app-body flex flex-col p-4">
            <div class="flex justify-between mb-4">
                <h3 class="text-lg font-bold">Local Documents</h3>
                <input type="file" id="file-upload" class="hidden" onchange="addFile(event)">
                <button onclick="document.getElementById('file-upload').click()" class="bg-blue-600 px-4 py-1 rounded text-xs">+ Upload</button>
            </div>
            <div id="file-list" class="grid grid-cols-4 gap-4 overflow-y-auto"></div>
        </div>
    </div>

    <div id="youtube" class="window glass w-[850px] h-[550px] top-20 left-1/2 -translate-x-1/2">
        <div class="title-bar"><span>📺 YouTube Elite</span><button onclick="closeApp('youtube')" class="text-red-500 font-bold">✕</button></div>
        <div class="app-body">
            <iframe id="yt-frame" src="https://www.youtube.com/embed/videoseries?list=PLB97334757DC8BA04" class="w-full h-full" allowfullscreen></iframe>
        </div>
    </div>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 glass px-8 py-3 rounded-[24px] flex gap-8 items-center border border-white/20">
        <div class="dock-icon" onclick="openApp('browser')"><i data-lucide="search" class="text-blue-400"></i></div>
        <div class="dock-icon" onclick="openApp('files')"><i data-lucide="folder" class="text-yellow-400"></i></div>
        <div class="dock-icon" onclick="openApp('youtube')"><i data-lucide="play" class="text-red-500"></i></div>
        <div class="w-[1px] h-10 bg-white/10 mx-2"></div>
        <div class="dock-icon" onclick="location.reload()"><i data-lucide="power" class="text-white"></i></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
